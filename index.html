<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy Birthday, AJ! 🎂</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    :root{--o:#F47321;--n:#001A4E;--g:#FFD700;--r:#8B1A1A;--b:#0A0A0F;--c:#F5F0E8}
    html,body{height:100%;overflow:hidden;background:#000}

    /* SCENE SYSTEM */
    .scene{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .8s ease;overflow:hidden}
    .scene.active{opacity:1;pointer-events:auto}

    /* SCENE 1: INTRO */
    #s1{background:radial-gradient(ellipse at center,#001A4E 0%,#0A0A0F 100%);display:flex;align-items:center;justify-content:center}
    .sweep{position:absolute;inset:0;background:conic-gradient(from 260deg at 50% -10%,rgba(255,253,231,.15) 0deg,transparent 38deg);animation:sweep 5s ease-in-out infinite alternate;pointer-events:none}
    .s1c{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center;padding:20px}
    .eye-sm{width:88px;height:88px;animation:eyePulse 2.2s ease-in-out infinite;filter:drop-shadow(0 0 14px rgba(244,115,33,.85))}
    .t-sub{font-size:clamp(.8rem,2.5vw,1rem);letter-spacing:.55em;color:var(--g);font-weight:700;opacity:0;animation:fadeUp .8s ease-out .4s forwards}
    .t-main{font-size:clamp(1.9rem,6.5vw,3.4rem);font-weight:900;color:#fff;letter-spacing:.06em;text-shadow:0 0 40px rgba(244,115,33,.5);opacity:0;animation:fadeUp 1s ease-out .7s forwards}
    .t-stars{display:flex;gap:8px;margin-top:4px}
    .t-stars span{color:var(--g);font-size:1rem;opacity:0;animation:starPop .4s ease-out forwards}
    .t-stars span:nth-child(1){animation-delay:1.2s}.t-stars span:nth-child(2){animation-delay:1.4s}.t-stars span:nth-child(3){animation-delay:1.6s}.t-stars span:nth-child(4){animation-delay:1.8s}.t-stars span:nth-child(5){animation-delay:2s}
    .enter-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border:none;border-radius:999px;background:var(--o);color:#fff;font-size:clamp(.9rem,2.5vw,1.05rem);font-weight:700;letter-spacing:.05em;cursor:pointer;box-shadow:0 0 30px rgba(244,115,33,.55);opacity:0;animation:fadeUp .6s ease-out 2.3s forwards;transition:transform .15s,box-shadow .2s}
    .enter-btn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(244,115,33,.9)}
    .arr{display:inline-block;animation:arrBounce 1.1s ease-in-out 2.8s infinite}
    .hint{font-size:.72rem;color:rgba(255,255,255,.35);letter-spacing:.18em;opacity:0;animation:fadeUp .5s ease-out 3s forwards}

    /* SCENE 2: ANNOUNCEMENT */
    #s2{background:#060609;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
    .eye-wrap{position:relative;display:flex;align-items:center;justify-content:center}
    .glow-ring{position:absolute;width:clamp(175px,28vw,230px);height:clamp(175px,28vw,230px);border-radius:50%;border:1.5px solid rgba(244,115,33,.3);animation:glowPulse 2.2s ease-in-out infinite alternate}
    .eye-lg{width:clamp(120px,20vw,155px);height:clamp(120px,20vw,155px);animation:eyeBreath 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(244,115,33,.9))}
    .kuya-tag{font-size:.68rem;letter-spacing:.45em;color:var(--o);font-weight:700;text-transform:uppercase}
    .a-block{max-width:min(580px,88vw);text-align:center;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .a-line{font-size:clamp(1.1rem,3.5vw,1.65rem);color:var(--c);line-height:1.55}
    .cur{display:inline-block;width:2px;height:1.1em;background:var(--o);vertical-align:text-bottom;margin-left:2px;animation:blink .7s step-end infinite}
    .nxt{padding:11px 26px;background:transparent;color:var(--o);border:1.5px solid var(--o);border-radius:999px;font-size:.95rem;font-weight:600;cursor:pointer;letter-spacing:.04em;opacity:0;pointer-events:none;transition:opacity .5s ease,background .2s,color .15s}
    .nxt.show{opacity:1;pointer-events:auto}
    .nxt:hover{background:var(--o);color:#fff}

    /* SCENE 3: DIARY ROOM */
    #s3{background:#080000}
    .room{position:absolute;inset:0}
    .r-back{position:absolute;left:18%;right:18%;top:0;bottom:0;background:linear-gradient(180deg,#7A1515 0%,#4E0C0C 55%,#220505 100%)}
    .r-back::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 38px,rgba(0,0,0,.06) 38px,rgba(0,0,0,.06) 39px)}
    .r-left{position:absolute;left:0;top:0;bottom:0;width:22%;background:linear-gradient(90deg,#0E0000 0%,#4A0C0C 100%)}
    .r-right{position:absolute;right:0;top:0;bottom:0;width:22%;background:linear-gradient(270deg,#0E0000 0%,#4A0C0C 100%)}
    .r-spot{position:absolute;left:50%;top:0;transform:translateX(-50%);width:320px;height:100%;background:linear-gradient(to bottom,rgba(255,252,220,.22) 0%,rgba(255,252,220,0) 70%);clip-path:polygon(42% 0%,58% 0%,78% 100%,22% 100%);pointer-events:none}
    .r-sign{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:.58rem;letter-spacing:.55em;color:var(--o);font-weight:700;opacity:.75;z-index:2}
    .chair{position:absolute;bottom:24%;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:1}
    .c-back{width:64px;height:52px;background:#220A02;border-radius:5px 5px 0 0;border:2px solid var(--o);border-bottom:none}
    .c-seat{width:74px;height:14px;background:#331204;border-radius:2px;border:1.5px solid rgba(244,115,33,.45)}
    .c-legs{display:flex;gap:42px}
    .c-leg{width:4px;height:26px;background:#220A02;border-radius:1px}
    .d-env{position:absolute;top:50%;left:50%;transform:translateX(-50%) translateY(-120vh) rotate(-7deg);opacity:0;z-index:3;width:clamp(96px,16vw,130px)}
    #s3.active .d-env{animation:envDrop 1.3s cubic-bezier(.34,1.56,.64,1) .5s forwards}
    .s3-cta{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:10}
    .s3-cta .nxt{opacity:1;pointer-events:auto}

    /* SCENE 4: ENVELOPE */
    #s4{background:radial-gradient(ellipse at center,#0D0420 0%,#0A0A0F 100%);display:flex;align-items:center;justify-content:center}
    .env-stage{display:flex;flex-direction:column;align-items:center;gap:36px}
    .env-wrap{width:min(340px,86vw);position:relative;perspective:600px}
    .env-body{width:100%;height:200px;background:linear-gradient(145deg,#FFF8E7 0%,#F5E6C8 100%);border:2px solid var(--o);border-radius:4px;position:relative;overflow:visible}
    .env-body::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 49%,rgba(244,115,33,.12) 49%,rgba(244,115,33,.12) 51%,transparent 51%),linear-gradient(225deg,transparent 49%,rgba(244,115,33,.12) 49%,rgba(244,115,33,.12) 51%,transparent 51%)}
    .env-flap{position:absolute;top:-2px;left:-2px;right:-2px;height:108px;background:linear-gradient(155deg,#FFD700 0%,var(--o) 100%);border:2px solid var(--o);clip-path:polygon(0% 0%,100% 0%,50% 95%);transform-origin:top center;z-index:4}
    .env-seal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.55rem;z-index:5;line-height:1}
    .env-letter{position:absolute;left:12px;right:12px;bottom:12px;height:140px;background:#FFFEF5;border:1px solid rgba(244,115,33,.25);border-radius:3px;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;opacity:0;z-index:1}
    .env-letter p{font-size:.82rem;color:#5C3A00;line-height:1.65}
    .env-letter p:first-child{font-weight:700;color:var(--o);margin-bottom:5px;font-size:.9rem}
    .env-wrap.opening .env-flap{animation:flapOpen 1.3s cubic-bezier(.4,0,.2,1) .4s forwards}
    .env-wrap.opening .env-seal{animation:sealFade .6s ease-out .5s forwards}
    .env-wrap.opening .env-letter{animation:letterUp .9s ease-out 1.1s forwards}

    /* SCENE 5: MESSAGE */
    #s5{background:linear-gradient(160deg,#001A4E 0%,#0A0A0F 55%,#16000C 100%);overflow-y:auto}
    .cfetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .cfetti span{position:absolute;top:-20px;animation:cfall linear infinite}
    .msg-wrap{max-width:660px;margin:0 auto;padding:46px 22px 64px;position:relative;z-index:1}
    .msg-head{text-align:center;margin-bottom:30px;animation:fadeUp .7s ease-out forwards}
    .msg-badge{display:inline-block;padding:4px 14px;background:rgba(244,115,33,.12);border:1px solid rgba(244,115,33,.35);border-radius:999px;font-size:.78rem;color:var(--o);letter-spacing:.05em;margin-bottom:12px}
    .msg-h1{font-size:clamp(1.5rem,5vw,2.7rem);font-weight:900;color:var(--g);text-shadow:0 0 28px rgba(255,215,0,.5);line-height:1.2}
    .msg-body{font-size:clamp(.92rem,2.5vw,1.05rem);line-height:1.9;color:var(--c);white-space:pre-line;min-height:180px}
    .msg-foot{margin-top:24px;font-size:1rem;color:var(--c);line-height:1.8;opacity:0;transition:opacity 1.1s ease}
    .msg-foot.show{opacity:1}
    .msg-foot strong{color:var(--g);font-size:1.1rem}
    .hearts{margin-top:12px;font-size:1.5rem;letter-spacing:.18em}

    /* MUSIC BTN */
    .music-btn{position:fixed;bottom:18px;right:18px;z-index:300;padding:9px 16px;border-radius:999px;border:1px solid var(--o);background:rgba(10,10,15,.82);color:var(--c);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 6px 20px rgba(244,115,33,.2);backdrop-filter:blur(8px);transition:box-shadow .2s}
    .music-btn:hover{box-shadow:0 6px 30px rgba(244,115,33,.5)}

    /* KEYFRAMES */
    @keyframes sweep{from{transform:rotate(-35deg);opacity:.7}to{transform:rotate(35deg);opacity:1}}
    @keyframes eyePulse{0%,100%{filter:drop-shadow(0 0 10px rgba(244,115,33,.7));transform:scale(1)}50%{filter:drop-shadow(0 0 24px rgba(244,115,33,1));transform:scale(1.07)}}
    @keyframes eyeBreath{0%,100%{transform:scale(.95)}50%{transform:scale(1.05)}}
    @keyframes glowPulse{from{box-shadow:0 0 18px rgba(244,115,33,.25);border-color:rgba(244,115,33,.25)}to{box-shadow:0 0 70px rgba(244,115,33,.65),0 0 110px rgba(244,115,33,.18);border-color:rgba(244,115,33,.65)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes starPop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
    @keyframes arrBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes envDrop{to{transform:translateX(-50%) translateY(-50%) rotate(0deg);opacity:1}}
    @keyframes flapOpen{0%{transform:rotateX(0deg)}45%{transform:rotateX(-168deg)}100%{transform:rotateX(-168deg)}}
    @keyframes sealFade{to{opacity:0;transform:translate(-50%,-50%) scale(.3)}}
    @keyframes letterUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(-55px)}}
    @keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1}85%{opacity:1}100%{transform:translateY(108vh) rotate(700deg);opacity:0}}

    @media(max-width:600px){.r-left,.r-right{display:none}.env-wrap{width:88vw}.msg-wrap{padding:32px 16px 52px}}
  </style>
</head>
<body>

<audio id="bgMusic" src="happy-birthday.mp3" preload="auto" loop></audio>
<button class="music-btn" id="musicBtn"><span>🎵</span><span id="musicLabel">Play music</span></button>

<!-- SCENE 1: INTRO -->
<section id="s1" class="scene active">
  <div class="sweep"></div>
  <div class="s1c">
    <svg class="eye-sm" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M5,50 Q50,5 95,50 Q50,95 5,50 Z" fill="none" stroke="#F47321" stroke-width="3.5"/>
      <circle cx="50" cy="50" r="22" fill="#001A4E" stroke="#F47321" stroke-width="2"/>
      <circle cx="50" cy="50" r="11" fill="#F47321"/>
      <circle cx="44" cy="44" r="3.5" fill="rgba(255,255,255,.65)"/>
      <circle cx="50" cy="50" r="34" fill="none" stroke="#F47321" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>
      <circle cx="50" cy="50" r="44" fill="none" stroke="#FFD700" stroke-width=".5" stroke-dasharray="2 5" opacity=".22"/>
    </svg>
    <div>
      <div class="t-sub">PINOY</div>
      <div class="t-main">BIG BROTHER</div>
      <div class="t-stars"><span>★</span><span>★</span><span>★</span><span>★</span><span>★</span></div>
    </div>
    <button class="enter-btn" id="enterBtn">PUMASOK SA BAHAY <span class="arr">▶</span></button>
    <p class="hint">I-tap para magsimula</p>
  </div>
</section>

<!-- SCENE 2: KUYA'S ANNOUNCEMENT -->
<section id="s2" class="scene">
  <div class="eye-wrap">
    <div class="glow-ring"></div>
    <svg class="eye-lg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M5,50 Q50,5 95,50 Q50,95 5,50 Z" fill="none" stroke="#F47321" stroke-width="3.5"/>
      <circle cx="50" cy="50" r="22" fill="#001A4E" stroke="#F47321" stroke-width="2"/>
      <circle cx="50" cy="50" r="11" fill="#F47321"/>
      <circle cx="44" cy="44" r="3.5" fill="rgba(255,255,255,.65)"/>
      <circle cx="50" cy="50" r="34" fill="none" stroke="#F47321" stroke-width="1" stroke-dasharray="4 3" opacity=".4"/>
    </svg>
  </div>
  <p class="kuya-tag">— KUYA —</p>
  <div class="a-block">
    <p class="a-line" id="aLine"><span class="cur"></span></p>
  </div>
  <button class="nxt" id="s2Next">Tuloy ang kwento ▶</button>
</section>

<!-- SCENE 3: DIARY ROOM -->
<section id="s3" class="scene">
  <div class="room">
    <div class="r-back"></div>
    <div class="r-left"></div>
    <div class="r-right"></div>
    <div class="r-spot"></div>
    <div class="r-sign">DIARY ROOM</div>
    <div class="chair">
      <div class="c-back"></div>
      <div class="c-seat"></div>
      <div class="c-legs"><div class="c-leg"></div><div class="c-leg"></div></div>
    </div>
    <div class="d-env">
      <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" style="width:100%;filter:drop-shadow(0 8px 22px rgba(244,115,33,.5))">
        <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFF8E7" stroke="#F47321" stroke-width="2.5"/>
        <polygon points="2,2 60,46 118,2" fill="#FFD700" stroke="#F47321" stroke-width="1.5"/>
        <polyline points="2,78 42,46" stroke="#E8C97A" stroke-width="1.5" fill="none"/>
        <polyline points="118,78 78,46" stroke="#E8C97A" stroke-width="1.5" fill="none"/>
        <text x="60" y="63" text-anchor="middle" font-size="18">💌</text>
      </svg>
    </div>
  </div>
  <div class="s3-cta">
    <button class="nxt" id="s3Next">Buksan ang sulat ▶</button>
  </div>
</section>

<!-- SCENE 4: ENVELOPE OPENING -->
<section id="s4" class="scene">
  <div class="env-stage">
    <div class="env-wrap" id="envWrap">
      <div class="env-body">
        <div class="env-flap"></div>
        <div class="env-seal">💌</div>
        <div class="env-letter">
          <div><p>Para kay AJ,</p><p>May mensahe para sa iyo<br/>mula sa isang espesyal na tao...</p></div>
        </div>
      </div>
    </div>
    <button class="nxt" id="s4Next">Basahin ang mensahe ▶</button>
  </div>
</section>

<!-- SCENE 5: BIRTHDAY MESSAGE -->
<section id="s5" class="scene">
  <div class="cfetti" id="cfetti"></div>
  <div class="msg-wrap">
    <div class="msg-head">
      <div class="msg-badge">Mula kay Mark 💌</div>
      <h1 class="msg-h1">Happy Birthday, AJ! 🎂</h1>
    </div>
    <div class="msg-body" id="msgBody"
      data-text="Hi Aaron, happy happy birthday!

First, I would like to thank you for being still a friend to me. Thank you for the encouragement and for always including me in some of your gatherings. I really appreciate that. You know how hard it is for me to be invited, and you always try to include me. I may not say yes at all times, but I really do appreciate all the invites — all the intentionality that you show. I appreciate it so much.

I also wanted to thank you because you're still my friend in the darkest times and in success. And even in faith, we have a common understanding of how life makes it hard for us. Eventually, we got each other's backs when we needed it the most.

I just wish that our friendship will become stronger in time. And I also wish that you continue to strive in life. I know that you're going back to school, and I'm happy to see that — you're actually one of the people who convinced me to enroll when I was at my lowest, and then the rest is history. Now it's your time to go back to your dreams, and we are just here for virtual and emotional support. You can do it.

You've changed a lot, and it's for the better. We are just very happy for you. May you keep your feet on the ground, and may you continue embracing who you are.

Thank you so much. I wish that your day is filled with great things and with success — for any pursuits in life, even in studying.

Happy birthday, Sissy. 🎂💖">
    </div>
    <div class="msg-foot" id="msgFoot">
      <p>Warmly,</p>
      <p><strong>Mark</strong></p>
      <div class="hearts">💖 🎉 🌟 🎂 💖</div>
    </div>
  </div>
</section>

<script>
  const music = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  const musicLabel = document.getElementById('musicLabel');

  // Scene manager
  let cur = 's1';
  function go(next) {
    document.getElementById(cur).classList.remove('active');
    setTimeout(function() {
      cur = next;
      document.getElementById(cur).classList.add('active');
      onEnter(cur);
    }, 820);
  }
  function onEnter(id) {
    if (id === 's2') kuya();
    if (id === 's4') setTimeout(openEnv, 350);
    if (id === 's5') { spawnConfetti(); setTimeout(typeMsg, 500); }
  }

  // Scene 1
  document.getElementById('enterBtn').addEventListener('click', function() {
    music.play().catch(function() {});
    go('s2');
  });

  // Scene 2: Kuya typewriter
  var lines = [
    "Magandang gabi, mga housemates...",
    "Pansin ng Bahay ni Kuya...",
    "May isang espesyal na mensahe...",
    "Para sa ating minamahal na housemate...",
    "Si... AJ RAV.",
    "",
    "AJ, may nagpadala sa iyo ng isang sulat.",
    "Pumunta ka na sa Diary Room."
  ];

  function kuya() {
    var lineEl = document.getElementById('aLine');
    var btn    = document.getElementById('s2Next');
    var li = 0, done = false;

    document.getElementById('s2').addEventListener('click', function() {
      if (!done) {
        done = true;
        lineEl.innerHTML = lines[lines.length - 1] + '<span class="cur"></span>';
        btn.classList.add('show');
      }
    }, { once: true });

    function typeLine(text, cb) {
      if (done) return;
      var i = 0;
      lineEl.innerHTML = '<span class="cur"></span>';
      (function tick() {
        if (done) return;
        lineEl.innerHTML = text.slice(0, i) + '<span class="cur"></span>';
        if (i++ < text.length) { setTimeout(tick, 48); }
        else { setTimeout(cb, text ? 750 : 350); }
      })();
    }

    (function run() {
      if (done || li >= lines.length) {
        if (!done) setTimeout(function() { btn.classList.add('show'); }, 700);
        return;
      }
      typeLine(lines[li++], run);
    })();
  }

  document.getElementById('s2Next').addEventListener('click', function() { go('s3'); });

  // Scene 3
  document.getElementById('s3Next').addEventListener('click', function() { go('s4'); });

  // Scene 4: envelope open
  function openEnv() {
    document.getElementById('envWrap').classList.add('opening');
    setTimeout(function() {
      document.getElementById('s4Next').classList.add('show');
    }, 2500);
  }
  document.getElementById('s4Next').addEventListener('click', function() { go('s5'); });

  // Scene 5: confetti
  function spawnConfetti() {
    var colors = ['#F47321','#FFD700','#EC4899','#22C55E','#3B82F6','#A855F7','#EF4444','#F59E0B'];
    var layer  = document.getElementById('cfetti');
    for (var i = 0; i < 28; i++) {
      var s = document.createElement('span');
      s.style.cssText = 'left:' + (Math.random()*100).toFixed(1) + '%;'
        + 'background:' + colors[i % colors.length] + ';'
        + 'animation-delay:' + (Math.random()*5).toFixed(2) + 's;'
        + 'animation-duration:' + (3.5 + Math.random()*5).toFixed(2) + 's;'
        + 'width:' + (4 + Math.random()*7).toFixed(1) + 'px;'
        + 'height:' + (8 + Math.random()*12).toFixed(1) + 'px;'
        + 'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';'
        + 'opacity:' + (0.7 + Math.random()*0.3).toFixed(2);
      layer.appendChild(s);
    }
  }

  // Scene 5: typewriter
  function typeMsg() {
    var el   = document.getElementById('msgBody');
    var text = el.dataset.text || '';
    var foot = document.getElementById('msgFoot');
    var s5   = document.getElementById('s5');
    el.textContent = '';
    var i = 0;
    (function tick() {
      el.textContent = text.slice(0, i);
      if (i++ <= text.length) {
        s5.scrollTop = s5.scrollHeight;
        setTimeout(tick, 20);
      } else {
        foot.classList.add('show');
      }
    })();
  }

  // Music
  musicBtn.addEventListener('click', function() {
    if (music.paused) {
      music.play().then(function() { musicLabel.textContent = 'Pause music'; }).catch(function() {});
    } else {
      music.pause();
      musicLabel.textContent = 'Play music';
    }
  });
</script>
</body>
</html>
